# Local CMS development: registry + tenant MySQL (see LOCAL_DEV.md)
services:
  mysql:
    image: mysql:8.0
    container_name: apimstec-cms-mysql
    restart: unless-stopped
    ports:
      - "${LOCAL_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${LOCAL_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: cms_registry
    volumes:
      - apimstec_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${LOCAL_MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  apimstec_mysql_data:
